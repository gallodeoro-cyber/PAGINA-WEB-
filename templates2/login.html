<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login</title>

  <script>
    (function(){
      var t = localStorage.getItem("theme");
      if (!t) t = "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth">
    <div class="auth-card">
      <div class="auth-title">Iniciar sesión</div>
      <div class="auth-sub">Slider LED · Panel</div>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="auth-form">
        <label>Usuario</label>
        <input name="user" placeholder="admin" required>

        <label>Contraseña</label>
        <input name="pass" type="password" placeholder="1234" required>

        <button class="btn primary" type="submit">Entrar</button>
      </form>

      <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
        <span class="muted" style="font-size:12px;">Tema</span>
        <button class="btn" type="button" id="themeBtnLogin">Cambiar</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("themeBtnLogin").addEventListener("click", function(){
      var cur = document.documentElement.getAttribute("data-theme") || "dark";
      var next = (cur === "dark") ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });
  </script>
</body>
</html>
